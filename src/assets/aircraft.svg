<!-- 
  Aircraft SVG — Top-down minimalist airplane silhouette
  WHY custom SVG: The spec explicitly prohibits standard map pins.
  This clean silhouette points "up" (north) by default, and is
  rotated dynamically via CSS transform based on true_track.
  The SVG is loaded as a Mapbox image for WebGL rendering.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Fuselage -->
  <path d="M32 4 L36 24 L36 44 L34 56 L32 60 L30 56 L28 44 L28 24 Z" fill="#f8fafc" opacity="0.95"/>
  <!-- Wings -->
  <path d="M28 24 L8 34 L8 37 L28 32 Z" fill="#f8fafc" opacity="0.85"/>
  <path d="M36 24 L56 34 L56 37 L36 32 Z" fill="#f8fafc" opacity="0.85"/>
  <!-- Tail wings -->
  <path d="M30 48 L20 54 L20 56 L30 52 Z" fill="#f8fafc" opacity="0.75"/>
  <path d="M34 48 L44 54 L44 56 L34 52 Z" fill="#f8fafc" opacity="0.75"/>
</svg>
